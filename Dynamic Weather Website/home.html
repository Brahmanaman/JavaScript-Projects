<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
        integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        
<style>
    * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
    
.container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.box {
    width: 25%;
    height: 60vh;
    background-color: #a5bbdd;
    margin: auto;
    border-radius: 10px;
    box-shadow: 5px 5px 25px -5px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
    transform: translate3d(0, 0, 0);
}
    
.inputData {
    padding: 20px;
}
    
.inputData input {
    padding: 10px;
    width: 100%;
    outline: none;
    border: none;
    font-size: 20px;
    border-radius: 10px;
}
    
i {
    font-size: 60px;
    display: flex;
    justify-content: center;
    margin-top: 20px;
}
    
.info {
    margin-top: 20%;
}
    
.info .temp {
    font-size: 30px;
    margin: 20px 0;
}
    
.info h3 {
    font-size: 20px;
    font-weight: 400;
}
    
.wave1 {
    opacity: 0.3;
    position: absolute;
    top: 120%;
    left: 50%;
    background: white;
    width: 50rem;
    height: 50rem;
    margin-left: -25rem;
    margin-top: -20rem;
    transform-origin: 50% 48%;
    border-radius: 43%;
    animation: drift 3000ms infinite linear;
    z-index: 1;
}
    
.wave2 {
    animation: drift 5000ms infinite linear;
    z-index: 2 !important;
    opacity: 0.2;
}
    
.wave3 {
    animation: drift 7000ms infinite linear;
    z-index: 3 !important;
    opacity: 0.1;
}
    
.box::after {
    content: "";
    display: block;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 11;
    transform: translate3d(0, 0, 0);
}
    @keyframes drift {
    from {
    transform: rotate(0deg);
    }
    from {
    transform: rotate(360deg);
    }
    }
</style>
</head>


<body>
    <div class="container">
        <div class="box">
            <div class="wave1"></div>
            <div class="wave2"></div>
            <div class="wave3"></div>
            <div class="weathercon">
            </div>
            <div class="info">
                <h2 class="location"><i class="fa-solid fa-street-view"></i>{%location%},{%country%}</h2>
                <p id="date"></p>
                <h1 class="temp">{%tempval%}&deg;C</h1>
                <h3 class="tempmin_max">Min {%tempmin%}&deg;C | Max {%tempmax%}&deg;C</h3>
            </div>
        </div>  
    </div>
    
    <script src="index.js"></script>

    <script>
        const currdate = document.getElementById("date");
const weathercon = document.getElementsByClassName("weathercon");

const tempstatus = "{%tempstatus%}";

if(tempstatus == "Sunny"){
    weathercon.innerHTML = '<i class="fa-solid fa-sun" style="color:yellow;"></i>';
}
else if(tempstatus == "Clouds"){
    weathercon.innerHTML = '<i class="fa-solid fa-cloud" style="color:yellow;"></i>';
}
else if(tempstatus == "Rainy"){
    weathercon.innerHTML = '<i class="fa-solid fa-cloud-rain" style="color:yellow;"></i>';
} else{
    weathercon.innerHTML = '<i class="fa-solid fa-cloud" style="color:yellow;"></i>';
}


const getcurrday = () =>{
    const weekdays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    const months = ["Jan","Feb","March","April","May","June","July","Aug","Sep","Oct","Nov","Dec"];

    let currentTime = new Date();
    var weekday = weekdays[currentTime.getDay()];

    var date = currentTime.getDate();
    var month = months[currentTime.getMonth()];
    var year = currentTime.getFullYear();
    var hour = currentTime.getHours();
    var minute = currentTime.getMinutes();

    let periods = "AM";
    if(hour > 11){
        periods = "PM";
        if(hour > 12){
            hour-=12;
        }
    }

    if(minute < 10){
        minute = "0"+minute;
    }
    return `${weekday} | ${date}-${month}-${year} ${hour}:${minute} ${periods}`;
};

currdate.innerHTML = getcurrday();
    </script>
</body>

</html>
